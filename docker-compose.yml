services:
  # ─────────────────────────────────────────────
  # Go Backend Service
  # ─────────────────────────────────────────────
  kitty-server:
    build:
      context: ./go-server
      dockerfile: Dockerfile
    container_name: kitty-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /root/
    command: ["./kitty-server"]
    env_file:
      - .env
    volumes:
      - ./uploads:/root/uploads
      - ~/.kitty-help/workspace:/root/.kitty-help/workspace
      - ./dist:/root/dist
      - ${LOCAL_OBSIDIAN_PATH}:/root/obsidian

  # ─────────────────────────────────────────────
  # Webhook Tunnel (Cloudflared)
  # ─────────────────────────────────────────────
  tunnel-manager:
    build:
      context: .
      dockerfile: Dockerfile.tunnel
    container_name: kitty-tunnel
    user: root
    volumes:
      - ~/.kitty-help/workspace:/root/.kitty-help/workspace
      - ./scripts:/scripts:ro
    environment:
      - TUNNEL_URL=http://kitty-server:3000
    entrypoint: ["sh", "/scripts/tunnel-manager.sh"]
    restart: unless-stopped


