services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host  # Enabled to avoid DNS issues during build
    container_name: kitty-help-backend
    network_mode: host
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/users"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kitty-help-cloudflared
    network_mode: host
    command: tunnel --url http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped
